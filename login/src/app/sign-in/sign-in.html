<div class="container">
  <div class="form-floating mb-3">
    <input type="email" class="form-control" id="floatingInput" [(ngModel)]="email" placeholder="name@example.com" />
    <label for="floatingInput">Email address</label>
  </div>
  <div class="form-floating">
    <input type="password" class="form-control" [(ngModel)]="password" id="floatingPassword" placeholder="Password" />
    <label for="floatingPassword">Password</label>
  </div>
  <div class="form-floating mt-3">
    <button class="$btn-hover-border-tint-amount:10%;" (click)="authenticate()">Login</button>
  </div>
</div>
